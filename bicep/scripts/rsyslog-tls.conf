# /etc/rsyslog.d/50-tls-listener.conf
# rsyslog TLS listener — RFC 5425 syslog-over-TLS on port 6514
# GnuTLS (gtls) stream driver
#
# Canonical source: bicep/scripts/rsyslog-tls.conf
# Deployed to /etc/rsyslog.d/50-tls-listener.conf via cloud-init write_files.
# Certificate material is sourced from Azure Key Vault (deviation-log item 4).
# Cert delivery: IMDS managed-identity fetch via fetch-kv-certs.sh (single mechanism).
#
# ─── Authentication modes ────────────────────────────────────────────────────
# "anon"       TLS encryption only; no client certificate required.
#              Default — deployable without a client CA.
# "x509/name"  Mutual TLS (mTLS); client must present a cert whose CN or SAN
#              matches PermittedPeers. Uncomment the mTLS block below and
#              change AuthMode to "x509/name" to enable.
# ─────────────────────────────────────────────────────────────────────────────

# Load imtcp with GnuTLS stream driver.
# StreamDriver.Mode="1" = TLS required (not optional).
module(load="imtcp"
       StreamDriver.Name="gtls"
       StreamDriver.Mode="1"
       StreamDriver.AuthMode="anon")

# ── Mutual-TLS block (DISABLED by default) ────────────────────────────────
# To enable mTLS:
#   1. Change AuthMode above to "x509/name"
#   2. Uncomment the PermittedPeers directive below
#   3. Store and deploy a CA cert that signed the client certs
# $ActionSendStreamDriverPermittedPeer *.yourdomain.example.com
# ─────────────────────────────────────────────────────────────────────────────

# Global TLS certificate paths.
# These files are populated by the IMDS fetch-kv-certs.sh script (cloud-init).
# The KeyVaultForLinux VM extension is NOT used — see deviation-log item 21.
# Key Vault secret names: syslog-ca-cert, syslog-server-cert, syslog-server-key
global(
  DefaultNetstreamDriver="gtls"
  DefaultNetstreamDriverCAFile="/etc/rsyslog.d/certs/ca.pem"
  DefaultNetstreamDriverCertFile="/etc/rsyslog.d/certs/server.pem"
  DefaultNetstreamDriverKeyFile="/etc/rsyslog.d/certs/server-key.pem"
)

# RFC 5425 TLS listener on port 6514.
input(type="imtcp" port="6514" name="tls-syslog")

# Received events are processed through rsyslog's normal ruleset.
# On Ubuntu 22.04, rsyslog forwards to the systemd journal by default.
# AMA (Azure Monitor Linux Agent) reads from the systemd journal — no
# additional action is required for DCR stream visibility.
#
# If you need an explicit on-disk copy:
# *.* action(type="omfile" file="/var/log/syslog-remote.log")

# ──────────────────────────────────────────────────────────────────────────────
# OPTIONAL — plaintext fallback — port 514 — DISABLED BY DEFAULT
#
# Uncomment only if you have legacy senders that cannot send TLS syslog.
# IMPORTANT: imtcp is already loaded above with the TLS stream driver; adding
# a plain TCP 514 input through imtcp would inherit TLS settings. Use imptcp
# (high-performance TCP module, no stream driver) for a plaintext TCP listener,
# or imudp for UDP-only. Keep the NSG source range locked to known sender CIDRs
# (deviation-log item 7).
#
# UDP plaintext fallback:
# module(load="imudp")
# input(type="imudp" port="514" name="plain-udp")
#
# TCP plaintext fallback (requires separate /etc/rsyslog.d/60-plain-tcp.conf
# that loads imptcp independently, since imtcp above is TLS-only):
# -- create /etc/rsyslog.d/60-plain-tcp.conf containing:
#    module(load="imptcp")
#    input(type="imptcp" port="514" name="plain-tcp")
# ──────────────────────────────────────────────────────────────────────────────
